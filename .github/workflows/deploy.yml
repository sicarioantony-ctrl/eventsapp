name: deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, crm-ui, api, bot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}-${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GHCR_USER: ${{ secrets.GHCR_USER }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy directory
        run: |
          ssh -p "${SSH_PORT:-22}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Upload compose
        run: |
          scp -P "${SSH_PORT:-22}" -i ~/.ssh/id_ed25519 docker-compose.prod.yml "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy
        run: |
          ssh -p "${SSH_PORT:-22}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_TAG='${IMAGE_TAG}' REGISTRY_IMAGE='${REGISTRY_IMAGE}' GHCR_USER='${GHCR_USER}' GHCR_PAT='${GHCR_PAT}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"

          export IMAGE_TAG="${IMAGE_TAG}"
          export REGISTRY_IMAGE="${REGISTRY_IMAGE}"

          if [ -n "${GHCR_PAT:-}" ] && [ -n "${GHCR_USER:-}" ]; then
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          fi

          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
EOF

